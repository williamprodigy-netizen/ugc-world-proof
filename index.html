ncome, quit-9to5, first-deal", "people_featured": "Aizza Nieto, Alex Gettlin, Andreas Rauca, Brian Ninh, Creator at 49, David Giovacchini, Ed, Evelyn, Jade, Jared Brubaker, Mike Friend, Mike Provenzano, Miranda Campbell, Missy Walker, Mom creator, Natalie Olsen, Nathalie Montoya, Pa, Rubie Lapena, Simone Dejean, Srishti, Sydney Yancy, Traveling creator, UGC World x Cheaterbuster", "source": "EOM SOP / Wins-to-CTA swipe", "full_text": "Is 2026 your year?\n\nWe're 3 weeks strong into 2026 and our creators are not wasting any time.\n\nI need to show you what is happening right now because it is actually insane.\n\nWe are three weeks into the new year and I am watching creators in our community hit numbers that most people spend years trying to reach.\n\n@Missy Wallker <https://www.instagram.com/ugc.missy/> just quit her full time job. She made $8K last month with UGC. $5,900 of that came from ONE single brand deal. She submitted her two week notice and January 31st is going to be her last day at her 9 to 5. She is done. Forever. She is going all in on UGC and she has the income to back it up.\n\n@Joe Staples <https://www.instagram.com/genx_joe_ugc/> literally 10x'd his income since we started working together. At the end of November he was making $200 a month. This January he has already landed over $3K in deals and he is now pushing for $10K months. He is a grandfather. He still works his 9 to 5. He is doing this on the side and still outearning most people who do this full time.\n\n@Sydney Yancy <https://www.instagram.com/sydney.yancy.ugc/> landed over $5K this month and signed a $2,500 monthly retainer doing UGC mixed with creative strategy. She quit her part time job literally the same night she told me. Her exact words: \"It wasn't easy doing this as a mother, balancing the responsibilities of learning a new skill and navigating the online world as a beginner. I felt super spread thin for a while, but the pieces are coming together and it feels like god is answering my prayers.\"\n\n@Andreas Rauca @andreas\\_ugc is 16 years old. Sixteen. He had another record breaking month this January after crushing December. He made his parents $6K by recording UGC for their local business and he already has $4K contracted for February. He is aiming for his first ever $10K month before he can even legally drive. He literally takes bathroom breaks during math class to film content because brands keep sending him work. I cannot make this up.\n\n@Simone Dejean <https://www.instagram.com/gma_is_chilling/> landed a $300 paid brand deal, creating content for a brand that she feels aligned with. She's a breast cancer survivor and is now getting paid to pursue her passions and interests. This purposeful alignment is what it's really about.\n\nRubie @ugcrubielapena is a nurse with a toddler, a dog, and a part time job. She is having back to back record months landing $3K plus in brand deals with some local UGC gigs mixed in. \"All while balancing family, life, toddler, a dog, and a part time job as a nurse.\" She is a rockstar and living proof that busy does not mean impossible.\n\nNathalie @Nadsarie is a stay at home mom. She hit $2K in December 2025 and then immediately in January landed a $3K UGC deal for a local mobile home community. She is already at $5K this month and her skills have improved after learning to think with a business owner mindset.\n\nSrishti <https://www.instagram.com/srishtii_kaurr/> just hit her first ever $3K month with UGC. She did this while side quest maxxing, traveling on a spontaneous trip to Bhutan. She also used the leadership skills we worked on together to get promoted from UGC creator to UGC manager, leading a 15 creator UGC Campaign. This is 10x her average salary in her home country by the way.\n\n@Jade W <https://www.instagram.com/jadew.ugc/> surpassed her goal of $1k/m, and is one brand deal away from $2k/m (still 8 days left as we speak). She recently graduated from NYU and is doing UGC as a side hustle while taking classes and preparing to chase her dream as an actor. I always say you can make UGC work no matter your situation and Jade is proof of that.\n\n@Mike Friend hit his first ever $5K month with UGC. He is a father and a veteran who was struggling to find the right online income vehicle that suited his personality and strengths. He found it and is now only pushing for more.\n\n@Aizza Nieto <https://www.instagram.com/aizza.ugc/> landed her first ever paid brand deal for $300 within less than 2 weeks of starting UGC. Two weeks. From zero to paid. She did this in Panama dealing with the uncertainty of not being in the U.S.A.\n\n@Miranda Campbell <https://www.instagram.com/ugcmirandalc/> was struggling at first setting up her systems but now she is experiencing what I call the popcorn effect. She was at $0 for the longest time and now she has landed her first ever $1K in deals within the past month. She also upgraded her home furniture and got a free couch as a bonus haha.\n\nEvelyn <https://www.instagram.com/evelyn.ugcc/> landed her first paid brand deal for $300 and is almost at $1K in brand deals this month. She is a senior in university and is looking to do UGC full time after she graduates. She is building her future right now while still in school.\n\nNatalie @creativee.nataliee hit another $3K month with UGC and hit her goal of landing $1K for a single brand deal. One UGC gig creating content for the Amazon Echo Show. Her words: \"4 videos that were easy to make.\" Easy money when you know what you are doing.\n\nCoach Brian <https://www.instagram.com/bninh13/> had another $10k month and is pushing for $15k before the month ends\\!\\!\\! He's generated over 100m views for one of the brands and is crushing with CPM style deals.\n\nCoach @Alex Gettlin <https://www.instagram.com/alexgettlin/> landed a $60,000 deal with a debt relief company doing longer form UGC. 5-10 minutes long.\n\nCoach @David Giovacchini <https://www.instagram.com/dave_giovacchini/> hit another $30k month with UGC, this time, working less and building his own customized AI pitching system to automatically pitch for him.\n\nAnd then there is the 5 Day Sprint we just ran to kick off 2026.\n\nThis was huge.\n\nWe had 100 plus creators officially go from complete beginners to starting their UGC journeys. Taking the first and hardest step. Building a portfolio. Pitching brands. Filming their first UGC content. Negotiating with real companies.\n\nAnd here is the part that blew my mind.\n\n23 creators got paid out LIVE during the 5 day sprint. Their first ever paid brand deals. Real money. Real brands. Real results in less than a week.\n\n13 from Coach Will. 10 from Coach Jared.\n\nI have never seen anything like this happen before. 23 people went from never having made a dollar with UGC to getting paid within days. That is the power of having the right systems and the right support.\n\nThis is not a fluke. This is not luck. This is a movement.\n\nWe have created something here that goes beyond just making money with UGC.\n\nThe mission is bigger than that.\n\nIt is about taking back control over your income and your mind.\n\nIt is about adopting the mindsets that allow you to achieve big in every area of your life. UGC is just the vehicle.\n\nAnd even better, for the first time this year, we've now publicly opened up enrollment for the Academy.\n\nThis is the first official cohort opening of 2026. Doors are open now but they will not stay open for long.\n\nI need to be clear. This is not for everyone.\n\nThis is only for a select few creators I can take on because this is a mentorship where you work with me directly and will get guaranteed placement in UGC Campaigns through the agency.\n\nThis means that my reputation is on the line and I cannot allow anyone who's not 100% fully in.\n\nIf you are looking for passive income, please do not apply.\n\nIf you can't commit to minimum 2 to 3 hours of daily coaching Monday to Saturday, this will not be for you.\n\nI am not looking for people who are flaky and want to give up the second they deal with a bit of hardship. I am not going to babysit you.\n\nI want creators coming in who assume accountability and ownership of their actions. Showing up Ready. Great attitude. Same ambition I have. Hungry to build something real.\n\nIf this does not resonate with you, there is no pressure at all to apply. That's why I created this free community in the UGC world by the way, so that you can work at your own pace, because quite frankly, not everyone is going to be up for a challenge like this.\n\nI frankly do not care whether you have followers or any experience creating content. That is the easy part. What I am looking for is someone with hunger, a willingness to learn, the ability to accept constructive criticism, and the discipline to be held accountable to the highest version of themselves.\n\nHere's what it looks like if you do get accepted into this mentorship, you will be guaranteed to be placed on one UGC Campaign with one of the partnerships. How fast depends on your current skill level and how fast you learn.\n\nI had a company doing $50million/year literally last night offer one of my UGC Creators in the academy a long term partnership for $70k/year to source, and train their entire UGC department.\n\nAgain, this is NOT a get rich QUICK scheme. There are no guarantees or promises as to how much you will make. I have seen creators make little to nothing for the first three months before they ever hit their stride.\n\nI don't want anyone to rely on me as the \"guarantee\" to success. After coaching 100+ successful creators and being surrounded by winners, here's what I realized:\n\nThere are four archetypes of humans in life:\n\nThe first type sees success stories and thinks \"Good. That just means it is possible. I am going to be next.\" They do not need proof. They need a path. They take action immediately.\n\nThe second type sees success stories and thinks \"Others have done this, so I know it works. I just want the clearest path and someone to hold me accountable.\" They believe they can win. They just want structure and support.\n\nThe third type sees success stories and thinks \"I know this works. I just keep second guessing my next move.\" They are intellectually convinced but emotionally stuck. They need pressure to finally act.\n\nThe fourth type sees success stories and thinks \"She did it because she is special. My situation is different.\" They look for reasons why it will not work for them. They cast blame the external. They look outwards, never inwards, and play the blame game. The only skillset of pointing fingers and making excuses. Circumstances. Timing. Other people.\n\nIf you are the fourth type, I cannot help you.\n\nBefore 1954 every scientist, doctor, and athlete on the planet believed running a mile in under 4 minutes was physically impossible. They said the human body was not built for it. They said the heart would give out. They said it could not be done.\n\nThen Roger Bannister did it and broke the 4 minute barrier.\n\nAnd 46 days later, someone else did it. Then another person. Then hundreds. Then thousands. Today high schoolers do it.\n\nNothing changed about human legs or human lungs. The only thing that changed was what people believed was possible.\n\nThat is how life works. The barrier is never physical. It is mental. The people who win are not the ones with better circumstances.\n\nThey are the ones who stop waiting for permission to believe they can.\n\nSo here is my question for you.\n\nYou just read about mothers, nurses, students, veterans, a 16 year old kid filming content during bathroom breaks, and a grandfather who 10x'd his income on the side. The mile has been broken. The proof is sitting right in front of you.\n\nAre you going to be the person who sees it and finally runs? Or are you going to be the person who sees it, nods, and then finds another reason to wait another year?\n\nIf you are type ome straight outta my own calendar and i cant scale myself.\n\nheres what u get when u join inner circle this week:\n\n\u2705 a 1:1 personal coaching: ur not just another \"number\" in a random community of 400 other students all trying to get ur attention. I actually make a personalized gamelan to you and align you with brands where you have some competitive advantage. everything catered to YOU and your current situation + goals.\n\n\u2705 agency brand deal fast track. this is the alexander piece. when u join inner circle this week, i can personally place u on a $1k+ brand deal within 7 days of onboarding. we have the brands. we have the budget. we just dont have enough trained creators on the roster to staff it all. ur pre vetted pipeline is already built, ur not knocking on doors, ur already inside the building.\n\n\u2705 everything else thats already inside ugca: the 1:1 coaching + accountability, the daily calls (it's 6 days/week), the full curriculum, the agency network, in person masterminds, and a wonderful community that's always sharing.\n\nwhy im running this right now:\n\nhonestly bc the agency cant wait + the popcorn effect is happening right now and i want more of u in the room before may starts.\n\nthe creators coming in this month are gonna ride that momentum into their first $1k, $5k, $10k month before summer. thats just how the timing is shaking out.\n\nthe ones who keep waiting? gonna be reading the may winsssss post in 30 days from the same chair, w the same income, telling themselves \"next month.\"\n\nive said this before but ill say it again bc it took me 2 years on my own to learn it.\n\nthe thing ur waiting for comes AFTER u take action. not before.\n\nu dont get clear and then start. u start and THEN u get clear.\n\nu dont wake up confident and then post the video. u post the video and then u become someone who posts videos.\n\ntheres no \"ready\" version of u sitting in the future. shes built thru the doing.\n\nIf u get it, u get it. If not, im not gonna try convincing u, no hard feelings, this probably isnt gonna be relevant for u anyways.\n\nwho this isnt for:\n\nIf u want passive income, this won't be for u. UGC is by far the simplest business model out there in comparison to everything else, HOWEVER, I still will not accept any form of laziness around me. I work w/some of the hungriest creators ever, and thats what keeps the community strong. If u want big outcomes with little effort, this isn't for u.\n\nIf u want a cheerleader. Ill gaslight u into being the most confident version of yourself, but im not ever gonna sugarcoat the advice i have to give you. U can handle extreme accountability, and u like being pushed, and listening to the harsh truth.\n\nWho this is for:\n\nUr someone who always makes it work no matter what. Despite having a family to take care of, despite having a job, despite whatever happens in life, you make it happen. No being the victim, no excuses, no BS, and yes, I get it, life does happen sometimes, which that's why I exist as a coach, but if making \"excuse\" is ur default state, then this won't work for u. I can teach UGC, but I can't teach \"hunger\".\n\nIf u resonate with: \"Life doesn't happen to me, I happen to life\" , you'll be an amazing fit for this.\n\nheres my filter.\n\nim not here to convince anyone. Im not here to take the bottom 99% to the top 10%.\n\nIm here to take the top 1% to the top 0.1%.\n\nu know who u are. Again, the mentorship doesn't creator winners, it only accelerates people who were gonna win with or without my help.\n\nThe people u all see today who had these wins in april, im not taking the credit for, they showed up, they put in all the work to help them, they just leverage my past failures and mistakes and followed a blueprint that was laid out.\n\napplication only. 10 spots:\n\nhead to \u00f0\u009f\u0091\u0089 <https://ugc-world.com/landing> and apply.\n\nonce u apply, one of my team will personally schedule an interview to see if this is a good fit in the first place.\n\nthis gets unpinned 11:59pm may 2nd. 48 hour window. once its down, the 1:1 with me + the agency fast track come off the table and ill close it until further notice so i can just develop the talent already in this group.\n\nafter all, id rather have a tight knit inner circle of solid creators personally trained by me than hundreds of mediocre ones.\n\nif u read all the way down to here and ur still here, u already know what the answer is.\n\nur not waiting for more info. ur waiting for permission.\n\ni cant give u that. nobody can but urself.\n\nbut i can hand u a 1:1 call + a brand deal as a head start the second u decide to give it to urself.\n\napply \u00f0\u009f\u0091\u0089 <https://ugc-world.com/landing>\n\nlets go.\n\n\u2014 Gloria\n\nP.S. none of the success stories u just read about felt \"ready\" when they started.\n\nmike didnt feel ready. sydney didnt feel ready. luis was a retired chiropractor, dre just got laid off, nicole literally thought online money was a scam 2 months ago.\n\nthey didnt feel ready. they just jumped in the water and learned how to swim on the way down.\n\nP.P.S anyone who doesn't get accepted right now, it's not a \"no forever\", it's \"no as of right now\", which means still keep taking action. The free resources in here are MORE than enough to start getting paid\\!\n\napply here\u00f0\u009f\u0091\u0089<https://ugc-world.com/landing>"}, {"month": "Milestone (undated)", "angle": "10,000 creators who decided to stop waiting (UGC Games); $300-in-the-bank origin; 'we grew because we showed up for each other, not the algorithm'", "proof_claims": "belief, any-age, fits-busy-life, replaced-income", "people_featured": "Creator at 49, Ed, Gen X creator, Jared Brubaker, Joseph Staples, Jourdan Joseph, Karen Hanks, Mike Friend, Mike Provenzano, Nathalie Montoya, Pa, Simone Dejean, UGC World x Cheaterbuster", "source": "EOM SOP / Wins-to-CTA swipe", "full_text": "10,000 Creators Who Decided to Stop Waiting.\n\nwow, I'm truly speechless. . .\n\nwe're 3 days away from the OFFICIAL DATE of the UGC GAMES\n\nJust this week, we've just hit a huge personal milestone:\n\n10,000 creators in this free skool community.\n\n(edit: we hit 11k literally within 36 hrs, faster than I could even write this)\n\nI started this entire journey with less than $300 in my bank account. All i had was a burning desire to learn how to build freedom by serving others.\n\nMy whole mission was: \"If I can change just one person's life, and help one soul I'd be happy\"\n\nand we've definitely been able to achieve way more than that together:\n\nWe've been able to share so many impactful stories together:\n\nCreators like @Karen Hanks GEN X retired accountant found a way to make an extra side income with ZERO experience in the creator economy.\n\n@Cass Cleland who quit working 12 hr hospital shifts as a nurse in LA , fire her boss, and now solo travels Europe by her self.\n\n@Mike Friend, a veteran doing this on the side making an extra $5k/m after having a rough time navigating other online income opportunities.\n\n@Nathalie Montoya who was able to build a full time income as a SAHM\n\n@Jourdan Joseph , who's a d1 basketball athlete making an extra $6-8k/m on the side doing this\\!\n\n@Jared Brubaker , a Gen X Actor in LA who was able to make a real 6 figure full time income with UGC, so that he can take his family on nice vacations.\n\n@Simone Dejean who's a breast cancer survivor, getting paid to share her testimony, having a positive impact around the world.\n\nAND honestly, hundreds of more. I could go on and on . . .\n\nWe didn't grow because of the algorithm. We grew because we showed up for each other as a community. We helped each other, we made each other better.\n\nIn an era where procrastination and perfectionism steal more dreams than failure ever could, this community chose action. Chose accountability. Chose each other.\n\nand it's these stories and the impact that really fuel the community growth, inspiring hundreds of new creators every single week to believe that it's actually possible for someone like them.\n\nSomeone who wasn't born into money. Someone who doesn't have the perfect background. Someone who was scared, tired, overwhelmed, and still decided to start anyway.\n\nThat belief is contagious.\n\nAnd every story shared in this community is proof that the only thing standing between where you are and where you want to be. . . is the decision to begin.\n\n10,000 strong.\n\nAnd we're just getting started.\n\np.s if you haven't already got your free ticket for the UGC GAMES, do so here: <https://www.skool.com/ugc-world/the-q2-ugc-sprint-im-giving-out-1000>\n\nRSVP ONLY . spots are limited\\!\\!\\!"}, {"month": "Jun 2026", "angle": "6 months in - are you on track? + Missy's full progression recap ($8k->$10k->$15k->$20k) + Sophia's 2am-hospital quote; profit-not-revenue framing (no payroll/inventory/ad spend)", "proof_claims": "replaced-income, quit-9to5, fits-busy-life, retainer", "people_featured": "Angela Recine, Donna Yu, Ed, Jacob Levy, Jared Brubaker, Landy Lagarcia, Luka Wong, Missy Walker, Olivia S, Pa, Rea Lexinne, Sophia LaDue, Sydney Yancy, UGC World x Cheaterbuster", "source": "EOM SOP / Wins-to-CTA swipe", "full_text": "Subject line: 6 months into the year. Are you on track to hitting your goals?\n\nWe are officially halfway through 2026.\n\nToday's June 2nd. I meant to write this yesterday, but I spent the whole day side-questing in Chichen Itza, one of the seven world wonders\\!\n\nTake a second and ask yourself the question most people avoid in June.\n\nAre you on track for the goals you set in January?\n\nCause these creators definitely are:\n\n@Donna Yu hit her first ever $1,000 plus month in May. When we first started working together, Donna told me she had tried a bunch of other business models, like Etsy, youtube automation, but nothing ever came through. \u201cWhen I found UGC, and the right community, It seemed like this was more aligned and making money became a passion\u201d\n\n@Luka Wong was a top performer in the Cloud9 campaign and Sprout. She landed just over $3K in brand deals whilst doing this on top of her full time job. \n\n@Jacob Levy is a special ed teacher and a huge advocate for the neurodivergent community.  He is now getting paid to make content that actually helps the community he is already serving. This past month, Jacob landed an $800 a month brand deal with a job board built for neurodivergent workers.\n\n@Rea Lexinne landed her first ever paid brand deal in May. She spent three months trying UGC with a flawed system, getting rejected every single day, hearing nothing but \"can we send you a free product?\" This past month of May, she hit her first $1K in brand deals as a full time college student.\n\n@Angela Recine hit a personal goal of $6.5K goal this month, 3xed her monthly income, and did it six months ahead of schedule. She\u2019s coming close to six figure territory now. I gave her the copy and paste video format I used for Cloud9 step by step, she executed, and now she\u2019s made $3k from one single brand from just pure performance bonuses. \n\n@Sophia LaDue hit her biggest month ever. She has been showing up consistently in the past wins threads. She went from $3K last month to $9K profit this month with UGC. \n\nShe did this all whilst being a full time college student, figureskating coach, and a part time nurse working 12 hour shifts on the weekends. \n\n\u201cI worked 2x less hours than I did last month as a nurse, but made 3x more. The only regret I have is not starting sooner and believing in myself that I could do it. I came home at 2am one night from the hospital, and my arms were trembling from fatigue. The next morning, I had to do it all again, that\u2019s when I said no more and went all into UGC\u201d\n\n@Jared Brubaker had another $20K month, $11K of which came in as \"royalty ad spend\" from content he had already shipped. That kind of compounding makes it easier to scale your income without trading time for money. \n\n@Landy Lagarcia hit his first $5K month in his first month ever going all in on UGC after getting laid off from his job in May. \n\n\u201cI had been working as a therapist for just over a year and all of a sudden, this clinic lets me go, with no warning. I used that as a sign from god, said \u201ceh life\u2019s short, my real dream was always to create content\u201d and went all into this\u201d \n\n@Sydney Yancy also just hit her first ever $6k month\\!\\! Last month, she hit $5k and is only going upp\\! \n\n@olivia s first month of doing UGC, and she quit her soulless 9-5 tech job in LA, and is now going all into her dream of being a comedian. \n\n@Missy Walker just hit her first $20K month and is moving her family to their dream neighborhood in Florida. She's currently house shopping atm \u00f0\u009f\u0091\u0080.\n\nShe also didn't have to sacrifice any of her lifestyle or family time with her kids. Even better, she's integrated work and family together. Missy just brought her husband on to do UGC with her full time.\n\n(If you have been following me for 3 months, you know this is not a one and done thing.) \n\nShe hit her first $8K month in January, $10K in February, $15K in April, and now $20K in May. It takes time like anything great in life,  but if you trust the process, this can be one of the best online ventures. \n\nThis is all profit by the way, there\u2019s no managing payroll, product inventory,  ad spend, and no expenses to this unlike other these other low success business models you see online. \n\nThese are all regular people who come from humble beginnings, all trying to achieve the same mission: financial freedom. \n\nThese are teachers, nurses, actors, mothers, college students who just found the right vehicle and went all in on this opportunity.\n\nThey stopped waiting for \u201cpermission\u201d or the \u201cright time in life\u201d and went all in, realizing they had full control and full power of changing their life in just a couple of months. \n\nYou have the power to do the same.\n\nI\u2019m hosting a free live masterclass Wednesday, June 3rd at 8pm EST, where I walk you through exactly step by step the actions these creators are taking, and how you can start your summer off with a bang. \n\nRegister for the free [masterclass here](https://ugc-world.com/registration)\n\nGloria \u00f0\u009f\u00ab\u00a1\n\nP.S spots will be limited, last time I hosted this, zoom crashed out so first come first serve. See you tomorrow.\n\nP.P.S this will be the last final masterclass I do here in EST timezone before I fly to Spain and go enjoy Euro-Summer."}, {"month": "Jan 2026", "angle": "Gamified wins-collection: $1,000-prize challenge, point system per collab size, screenshot=bonus point; incentive design to surface social proof at scale", "proof_claims": "first-deal, replaced-income", "people_featured": "", "source": "EOM SOP / Fulfillment swipes", "full_text": ""}, {"month": "Monthly (template)", "angle": "Community wins-thread hype template: 'drop your wins below, total up your month, everyone gets an IG story shoutout, 200+ brand owners lurking on the team page'", "proof_claims": "first-deal", "people_featured": "Alex Gettlin, Cloud Nine (C9) / Vansh, Creator at 49, Ed, Pa, UGC World x Cheaterbuster", "source": "EOM SOP / Fulfillment swipes", "full_text": "May wins post  \n\nMAYYY WINSSSS\\!\\!\\!\\!\n\nokay we are basically at the end of may and I wanna seeee what you all cooked up this month \u00f0\u009f\u0091\u0080\n\nsome of you have been on an absolute TEAR lately, the deals are starting to compound and I'm so here for it. and if may was kinda slow for you? all goodddd, we reset, we reflect, we switch up the strategy for june. no biggie.\n\nDROP YOUR WINS IN THE COMMENTS BELOW \u2b07\ufe0f\n\ntell me: the brand/niche how much it was how you landed it bonus points if you throw in a vid of the UGC or a screenshot of the payment let claim='';
const claims=[...new Set(D.rows.map(r=>r.claim).filter(Boolean))].sort();
document.getElementById('chips').innerHTML=claims.map(c=>`<span class="chip" onclick="toggleClaim('${c}')">${c}</span>`).join(' ');
function toggleClaim(c){claim=claim===c?'':c;document.querySelectorAll('.chip').forEach(e=>e.classList.toggle('on',e.textContent===claim));render()}
function setTab(t){document.querySelectorAll('.tab').forEach(e=>e.classList.toggle('on',e.dataset.tab===t));
 document.getElementById('gallery').classList.toggle('hide',t!=='copy'?false:true);
 document.getElementById('gallery').style.display=t==='gallery'?'grid':'none';
 document.getElementById('copy').classList.toggle('hide',t!=='copy');render()}
function zoom(s){document.getElementById('lbimg').src=s;document.getElementById('lb').style.display='flex'}
function strclass(s){return s==='hero'?'hero':s==='strong'?'strong':'support'}
function render(){
 const q=document.getElementById('q').value.toLowerCase(),ver=document.getElementById('ver').value,im=document.getElementById('img').value;
 let rows=D.rows.filter(r=>{
   if(ver&&r.verified!==ver)return false;
   if(im&&!(r.imgs&&r.imgs.length))return false;
   if(claim&&r.claim!==claim)return false;
   if(q){const b=(r.person+' '+r.claim+' '+r.demographic+' '+r.result_metric+' '+r.notes+' '+r.proven_copy_angle).toLowerCase();if(!b.includes(q))return false}
   return true});
 const ord={hero:0,strong:1,supporting:2};
 rows.sort((a,b)=>(ord[a.strength]??3)-(ord[b.strength]??3)||((b.imgs?.length||0)-(a.imgs?.length||0)));
 document.getElementById('count').textContent='— '+rows.length+' shown';
 document.getElementById('gallery').innerHTML=rows.map(r=>{
   const img=r.imgs&&r.imgs.length?`<img class=thumb loading=lazy src="imgs/${r.imgs[0]}" onclick="zoom('imgs/${r.imgs[0]}')">`:`<div class=noimg>no local screenshot · ${r.proof_form}</div>`;
   const vb=r.verified==='YES'?'<span class="badge yes">VERIFIED</span>':'<span class="badge flag">FLAGGED</span>';
   const sb=`<span class="badge ${strclass(r.strength)}">${(r.strength||'').toUpperCase()}</span>`;
   const q=r.best_quote?`<div class=q>"${r.best_quote}"</div>`:'';
   const a=r.proven_copy_angle?`<div class=angle><b>angle:</b> ${r.proven_copy_angle}</div>`:'';
   const extra=r.imgs&&r.imgs.length>1?` <span class=tag>+${r.imgs.length-1} more</span>`:'';
   return `<div class=card>${img}<div class=body><div class=row1><span class=name>${r.person}</span><span class=metric>${r.result_metric}</span></div>
   <div class=meta>${r.demographic||''}</div><div>${vb} ${sb} <span class=tag>${r.claim}</span><span class=tag>${r.proof_class}</span>${extra}</div>
   ${q}${a}<div class=src style="margin-top:7px"><a href="${r.source_url}" target=_blank>open source ↗</a> · ${r.ID}</div></div></div>`}).join('');
 document.getElementById('copy').innerHTML=D.copy.map(c=>`<div class=copycard><h3>${c.month} — ${c.angle}</h3>

}
